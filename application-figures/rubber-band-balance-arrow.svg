<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Rubber Band Model Balance Figure</title>
  <desc id="desc">A person balancing on a bidirectional arrow, comparing what is pulling you and what is holding you.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7f6; stroke: #d9dee2; stroke-width: 2; }
      .arrow { fill: #eef1f3; stroke: #cfd7dd; stroke-width: 2; }
      .line { stroke: #1f2a33; stroke-width: 4; fill: none; }
      .person { stroke: #1f2a33; stroke-width: 4; fill: none; }
      .label { font-family: Arial, sans-serif; fill: #1f2a33; font-weight: 700; font-size: 34px; }
      .caption { font-family: Arial, sans-serif; fill: #1f2a33; font-size: 32px; }
    </style>
  </defs>

  <rect class="bg" x="20" y="20" width="1160" height="720" />

  <!-- bidirectional arrow -->
  <polygon class="arrow" points="120,370 235,280 235,330 965,330 965,280 1080,370 965,460 965,410 235,410 235,460" />

  <!-- labels -->
  <text class="label" x="330" y="270" text-anchor="middle">WHAT IS HOLDING YOU?</text>
  <text class="label" x="870" y="270" text-anchor="middle">WHAT IS PULLING YOU?</text>

  <!-- balancing bar -->
  <line class="line" x1="270" y1="410" x2="930" y2="350" />
  <rect x="250" y="392" width="40" height="24" rx="6" fill="#dfe5e9" stroke="#1f2a33" stroke-width="3" />
  <rect x="910" y="332" width="40" height="24" rx="6" fill="#dfe5e9" stroke="#1f2a33" stroke-width="3" />

  <!-- person -->
  <circle class="person" cx="600" cy="260" r="26" />
  <line class="person" x1="600" y1="286" x2="600" y2="395" />
  <line class="person" x1="600" y1="315" x2="520" y2="362" />
  <line class="person" x1="600" y1="315" x2="680" y2="362" />
  <line class="person" x1="600" y1="395" x2="552" y2="470" />
  <line class="person" x1="600" y1="395" x2="648" y2="470" />

  <text class="caption" x="120" y="690">If you have to decide between two good options, ask yourself what is holding you and what is pulling you.</text>
</svg>
