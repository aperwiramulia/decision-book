<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Feedback Box Matrix</title>
  <desc id="desc">A four-quadrant matrix for classifying feedback into Advice, Compliment, Criticism, and Suggestion.</desc>
  <defs>
    <style>
      .frame { fill: #f7f7f6; stroke: #d6dbe0; stroke-width: 2; }
      .quad { fill: #d7dcdf; stroke: #f7f7f6; stroke-width: 12; }
      .text { font-family: Arial, sans-serif; fill: #0f1a22; font-weight: 700; }
      .quote { font-size: 36px; }
      .label { font-size: 42px; }
      .axis { font-size: 42px; }
      .prompt { font-size: 34px; fill: #1f2a33; font-family: Arial, sans-serif; }
      .circle { fill: #f3f5f6; stroke: #c8d0d6; stroke-width: 2; }
      .pm { font-size: 42px; font-family: Arial, sans-serif; fill: #1f2a33; font-weight: 700; }
    </style>
  </defs>

  <rect class="frame" x="20" y="20" width="1160" height="780"/>

  <rect class="quad" x="130" y="90" width="430" height="260"/>
  <rect class="quad" x="560" y="90" width="430" height="260"/>
  <rect class="quad" x="130" y="350" width="430" height="260"/>
  <rect class="quad" x="560" y="350" width="430" height="260"/>

  <text class="text quote" x="345" y="175" text-anchor="middle">"I thought it was good,</text>
  <text class="text quote" x="345" y="223" text-anchor="middle">but it still needs to change!"</text>
  <text class="text label" x="345" y="300" text-anchor="middle">ADVICE</text>

  <text class="text quote" x="775" y="175" text-anchor="middle">"I thought it was good,</text>
  <text class="text quote" x="775" y="223" text-anchor="middle">and it can stay as it is in future!"</text>
  <text class="text label" x="775" y="300" text-anchor="middle">COMPLIMENT</text>

  <text class="text quote" x="345" y="435" text-anchor="middle">"I thought it was bad</text>
  <text class="text quote" x="345" y="483" text-anchor="middle">and it has to change!"</text>
  <text class="text label" x="345" y="560" text-anchor="middle">CRITICISM</text>

  <text class="text quote" x="775" y="435" text-anchor="middle">"I thought it was bad</text>
  <text class="text quote" x="775" y="483" text-anchor="middle">but I can live with it!"</text>
  <text class="text label" x="775" y="560" text-anchor="middle">SUGGESTION</text>

  <circle class="circle" cx="1040" cy="220" r="24"/>
  <text class="pm" x="1040" y="234" text-anchor="middle">+</text>
  <circle class="circle" cx="1040" cy="480" r="24"/>
  <text class="pm" x="1040" y="494" text-anchor="middle">-</text>

  <circle class="circle" cx="345" cy="660" r="24"/>
  <text class="pm" x="345" y="674" text-anchor="middle">-</text>
  <circle class="circle" cx="775" cy="660" r="24"/>
  <text class="pm" x="775" y="674" text-anchor="middle">+</text>

  <text class="prompt" x="130" y="755">Arrange the feedback you have received in the matrix. What advice do you want to follow?</text>
  <text class="prompt" x="130" y="792">Which criticisms prompt action? Which suggestions can you ignore?</text>
</svg>
